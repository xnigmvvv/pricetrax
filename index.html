<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PriceTrax — Badger Breaks</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --black: #0f0f0f;
      --gold: #cc0000;
      --gold-light: #ff3333;
      --cream: #f7f3ec;
      --white: #ffffff;
      --gray: #888;
      --border: #d4cfc6;
      --red: #c0392b;
      --green: #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--black);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--black);
      padding: 0 32px;
      display: flex;
      align-items: stretch;
      height: 64px;
      border-bottom: 3px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      border-right: 1px solid #2a2a2a;
      padding-right: 28px;
      margin-right: 28px;
    }

    .header-logo .badger { font-size: 26px; line-height: 1; }

    .header-logo .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--white);
      letter-spacing: 2px;
      line-height: 1;
    }

    .header-logo .wordmark span {
      color: var(--gold);
    }

    .header-sub {
      display: flex;
      align-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-print {
      background: transparent;
      border: 1px solid #333;
      color: #666;
      padding: 7px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .btn-print:hover { border-color: var(--gold); color: var(--gold); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: calc(100vh - 67px);
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      background: var(--white);
      border-right: 2px solid var(--black);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 12px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray);
    }

    .input-group input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: 4px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      background: var(--cream);
      color: var(--black);
      transition: border-color 0.15s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--black);
      background: var(--white);
    }

    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-add {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      border: 2px solid var(--black);
      border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: var(--black);
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--black);
      transition: all 0.1s;
    }

    .btn-add:hover {
      box-shadow: 1px 1px 0 var(--black);
      transform: translate(2px, 2px);
    }

    .btn-add:active {
      box-shadow: none;
      transform: translate(3px, 3px);
    }

    /* Toast */
    .toast {
      padding: 10px 14px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.2s;
      min-height: 38px;
    }
    .toast.show { opacity: 1; }
    .toast.ok { background: #eafaf1; color: var(--green); border: 1px solid #a9dfbf; }
    .toast.err { background: #fdf0ee; color: var(--red); border: 1px solid #f1a9a0; }

    /* Stats */
    .stats {
      border-top: 2px solid var(--cream);
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--black);
    }

    .stat-value.gold { color: var(--gold); }

    /* ── RIGHT PANEL ── */
    .right-panel {
      padding: 28px;
      overflow-y: auto;
    }

    .right-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .right-header .count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .btn-clear-all {
      background: none;
      border: 1px solid var(--border);
      color: var(--gray);
      padding: 5px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .btn-clear-all:hover { border-color: var(--red); color: var(--red); }

    .labels-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 12px;
      color: var(--border);
    }

    .empty-state .big { font-size: 48px; }
    .empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── LABEL CARD ── */
    .label-card {
      background: var(--white);
      border: 1.5px solid var(--black);
      border-radius: 3px;
      width: 164px;
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      box-shadow: 2px 2px 0 var(--black);
      page-break-inside: avoid;
    }

    .label-card .lc-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gray);
      width: 100%;
      text-align: center;
      border-bottom: 1px solid var(--cream);
      padding-bottom: 5px;
    }

    .label-card .lc-brand span { color: var(--gold); }

    .label-card .lc-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
      color: var(--black);
      max-width: 144px;
    }

    .label-card .lc-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      color: var(--black);
      border-top: 1px solid var(--cream);
      padding-top: 5px;
      width: 100%;
      text-align: center;
    }

    .label-card .lc-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      color: var(--gray);
      letter-spacing: 0.5px;
    }

    .btn-remove {
      position: absolute;
      top: 4px;
      right: 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--border);
      line-height: 1;
      transition: color 0.15s;
    }

    .btn-remove:hover { color: var(--red); }

    /* ── PRINT STYLES ── */
    @media print {
      @page {
        size: 3.5in 1.125in;
        margin: 0;
      }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .header, .left-panel, .right-header, .btn-remove, .toast, .empty-state { display: none !important; }
      body { background: white; margin: 0; padding: 0; overflow: hidden; }
      .layout { display: block; margin: 0; padding: 0; }
      .right-panel { padding: 0; margin: 0; overflow: hidden; }
      .labels-grid { gap: 0; display: block; margin: 0; padding: 0; }
      .label-card {
        box-shadow: none;
        border: none;
        border-radius: 0;
        width: 3.5in;
        height: 1.125in;
        min-height: 0;
        padding: 4pt 6pt;
        margin: 0;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 6pt;
        page-break-after: always;
        break-after: page;
        overflow: hidden;
      }
      .label-card .lc-brand { display: none !important; }
      .label-card .lc-date { display: none !important; }
      .label-card .lc-price { display: none !important; }
      .label-card .lc-name {
        font-size: 9pt;
        font-weight: 700;
        text-align: left;
        word-break: break-word;
        flex: 1;
        max-width: 2.2in;
        line-height: 1.25;
        overflow: hidden;
      }
      #qr-container, [id^="qr-"] { flex-shrink: 0; width: 0.9in; height: 0.9in; }
      [id^="qr-"] img, [id^="qr-"] canvas { width: 0.9in !important; height: 0.9in !important; }
    }
  </style>
</head>
<body>

<header class="header no-print">
  <div class="header-logo">
    <span style="display:inline-block;width:18px;height:18px;background:var(--gold);border-radius:2px;transform:rotate(45deg);flex-shrink:0;margin-right:4px;"></span><span class="wordmark">PRICE<span>TRAX</span></span>
  </div>
  <div class="header-sub">PriceTrax</div>
  <div class="header-actions">
    <button class="btn-print" onclick="printLabels()">⎙ Print Labels</button>
    <a href="https://docs.google.com/spreadsheets/d/1FZsoPeXGp1eXJw1S2X6UoxRypSLm3_tj7RpXWL0yWJo/edit" target="_blank" style="text-decoration:none;">
      <button class="btn-print">📊 View Sheet</button>
    </a>
  </div>
</header>

<div class="layout">

  <!-- LEFT: INPUT -->
  <aside class="left-panel no-print">

    <div>
      <div class="section-label">New Card Entry</div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="input-group">
          <label>Card Name</label>
          <input type="text" id="cardName" placeholder="e.g. 2021 Topps Chrome Trout" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('cardPrice').focus()">
        </div>
        <div class="price-row">
          <div class="input-group">
            <label>Purchase Price ($)</label>
            <input type="number" id="cardPrice" placeholder="0.00" min="0" step="0.01" onkeydown="if(event.key==='Enter')addLabel()">
          </div>
          <div class="input-group">
            <label>Qty</label>
            <input type="number" id="cardQty" placeholder="1" min="1" step="1" value="1" onkeydown="if(event.key==='Enter')addLabel()">
          </div>
        </div>
        <button class="btn-add" onclick="addLabel()">+ Add Label</button>
        <div id="toast" class="toast"></div>
      </div>
    </div>

    <div class="stats">
      <div class="section-label">Session Summary</div>
      <div class="stat-row">
        <span class="stat-label">Cards Added</span>
        <span class="stat-value" id="stat-count">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Total Spent</span>
        <span class="stat-value gold" id="stat-total">$0.00</span>
      </div>
    </div>

  </aside>

  <!-- RIGHT: LABELS -->
  <main class="right-panel">
    <div class="right-header no-print">
      <span class="count" id="label-count">No labels yet</span>
      <button class="btn-clear-all" onclick="clearAll()">Clear All</button>
    </div>

    <div id="empty-state" class="empty-state">
      <span class="big">🃏</span>
      <p>Enter a card on the left to get started</p>
    </div>

    <div class="labels-grid" id="labels-grid"></div>
  </main>

</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxFwky0fg4MaekMMi53meyFNgQNQuEdAnFP-Na3diwWchir1OYF0CJkm0xMfzueogmNQw/exec";

let labels = [];
let totalSpent = 0;

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = "toast"; }, 3000);
}

function logToSheet(name, price, date) {
  const callbackName = "cb_" + Date.now();
  const url = `${SHEET_URL}?action=log&n=${encodeURIComponent(name)}&p=${encodeURIComponent(price)}&t=${date}&callback=${callbackName}`;
  window[callbackName] = function() {
    delete window[callbackName];
    document.getElementById(callbackName) && document.getElementById(callbackName).remove();
  };
  const script = document.createElement("script");
  script.id = callbackName;
  script.src = url;
  document.body.appendChild(script);
  setTimeout(() => {
    delete window[callbackName];
    script.remove();
  }, 10000);
}

function addLabel() {
  const nameEl = document.getElementById("cardName");
  const priceEl = document.getElementById("cardPrice");
  const qtyEl = document.getElementById("cardQty");

  const name = nameEl.value.trim();
  const price = parseFloat(priceEl.value);
  const qty = parseInt(qtyEl.value) || 1;

  if (!name) { showToast("Please enter a card name.", "err"); nameEl.focus(); return; }
  if (isNaN(price) || price < 0) { showToast("Please enter a valid price.", "err"); priceEl.focus(); return; }

  const date = new Date().toISOString().split("T")[0];

  for (let i = 0; i < qty; i++) {
    const id = Date.now() + i;
    labels.push({ id, name, price: price.toFixed(2), date });
    renderLabel({ id, name, price: price.toFixed(2), date });
    logToSheet(name, price.toFixed(2), date);
    totalSpent += price;
  }

  updateStats();
  nameEl.value = "";
  priceEl.value = "";
  qtyEl.value = "1";
  nameEl.focus();

  saveLabels();
  const msg = qty > 1 ? `✓ ${qty}× ${name} logged` : `✓ ${name} logged`;
  showToast(msg, "ok");
}

function renderLabel({ id, name, price, date }) {
  document.getElementById("empty-state").style.display = "none";

  const t = new Date().toISOString().split("T")[0];
  const url = `${SHEET_URL}?n=${encodeURIComponent(name)}&p=${encodeURIComponent(price)}&t=${t}`;

  const card = document.createElement("div");
  card.className = "label-card";
  card.id = "label-" + id;
  card.innerHTML = `
    <button class="btn-remove no-print" onclick="removeLabel(${id})" title="Remove">✕</button>
    <div class="lc-brand">PRICE<span>TRAX</span></div>
    <div id="qr-container"><div id="qr-${id}"></div></div>
    <div class="lc-name">${escHtml(name)}</div>
    <div class="lc-price">$${price}</div>
    <div class="lc-date">${date}</div>
  `;
  document.getElementById("labels-grid").appendChild(card);

  setTimeout(() => {
    new QRCode(document.getElementById("qr-" + id), {
      text: url,
      width: 120,
      height: 120,
      colorDark: "#0f0f0f",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M,
    });
  }, 50);
}

function removeLabel(id) {
  const idx = labels.findIndex(l => l.id === id);
  if (idx !== -1) {
    totalSpent -= parseFloat(labels[idx].price);
    labels.splice(idx, 1);
  }
  const el = document.getElementById("label-" + id);
  if (el) el.remove();
  updateStats();
  saveLabels();
  if (labels.length === 0) {
    document.getElementById("empty-state").style.display = "flex";
  }
}

function clearAll() {
  if (labels.length === 0) return;
  if (!confirm("Clear all labels?")) return;
  labels = [];
  totalSpent = 0;
  document.getElementById("labels-grid").innerHTML = "";
  document.getElementById("empty-state").style.display = "flex";
  updateStats();
  saveLabels();
}

function updateStats() {
  const n = labels.length;
  document.getElementById("stat-count").textContent = n;
  document.getElementById("stat-total").textContent = "$" + totalSpent.toFixed(2);
  document.getElementById("label-count").textContent =
    n === 0 ? "No labels yet" : `${n} label${n !== 1 ? "s" : ""} — hit Print Labels to print`;
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Load saved labels from localStorage
function loadSaved() {
  try {
    const saved = localStorage.getItem("pricetrax_labels");
    if (saved) {
      const parsed = JSON.parse(saved);
      parsed.forEach(l => {
        labels.push(l);
        totalSpent += parseFloat(l.price);
        renderLabel(l);
      });
      updateStats();
    }
  } catch(e) { console.warn("Could not load saved labels", e); }
}

function saveLabels() {
  try {
    localStorage.setItem("pricetrax_labels", JSON.stringify(labels));
  } catch(e) { console.warn("Could not save labels", e); }
}

loadSaved();
function printLabels() {
  if (labels.length === 0) {
    showToast("No labels to print.", "err");
    return;
  }
  window.print();
}

document.getElementById("cardName").focus();
</script>
</body>
</html>

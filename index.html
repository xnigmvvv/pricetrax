<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PriceTrax — Badger Breaks</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --black: #0f0f0f;
      --gold: #cc0000;
      --gold-light: #ff3333;
      --cream: #f7f3ec;
      --white: #ffffff;
      --gray: #888;
      --border: #d4cfc6;
      --red: #c0392b;
      --green: #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--black);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--black);
      padding: 0 32px;
      display: flex;
      align-items: stretch;
      height: 64px;
      border-bottom: 3px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      border-right: 1px solid #2a2a2a;
      padding-right: 28px;
      margin-right: 28px;
    }

    .header-logo .badger { font-size: 26px; line-height: 1; }

    .header-logo .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--white);
      letter-spacing: 2px;
      line-height: 1;
    }

    .header-logo .wordmark span {
      color: var(--gold);
    }

    .header-sub {
      display: flex;
      align-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-print {
      background: transparent;
      border: 1px solid #333;
      color: #666;
      padding: 7px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .btn-print:hover { border-color: var(--gold); color: var(--gold); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: calc(100vh - 67px);
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .left-panel {
        border-right: none;
        border-bottom: 2px solid var(--black);
      }
      .header-logo .wordmark { font-size: 22px; }
      .header-sub { display: none; }
      .price-row { grid-template-columns: 1fr 1fr; }
      .right-panel { padding: 16px; }
      .label-card { width: 140px; }
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      background: var(--white);
      border-right: 2px solid var(--black);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 12px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray);
    }

    .input-group input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: 4px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      background: var(--cream);
      color: var(--black);
      transition: border-color 0.15s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--black);
      background: var(--white);
    }

    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-add {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      border: 2px solid var(--black);
      border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: var(--black);
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--black);
      transition: all 0.1s;
    }

    .btn-add:hover {
      box-shadow: 1px 1px 0 var(--black);
      transform: translate(2px, 2px);
    }

    .btn-add:active {
      box-shadow: none;
      transform: translate(3px, 3px);
    }

    /* Toast */
    .toast {
      padding: 10px 14px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.2s;
      min-height: 38px;
    }
    .toast.show { opacity: 1; }
    .toast.ok { background: #eafaf1; color: var(--green); border: 1px solid #a9dfbf; }
    .toast.err { background: #fdf0ee; color: var(--red); border: 1px solid #f1a9a0; }

    /* Stats */
    .stats {
      border-top: 2px solid var(--cream);
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--black);
    }

    .stat-value.gold { color: var(--gold); }

    /* ── RIGHT PANEL ── */
    .right-panel {
      padding: 28px;
      overflow-y: auto;
    }

    .right-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .right-header .count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .btn-clear-all {
      background: none;
      border: 1px solid var(--border);
      color: var(--gray);
      padding: 5px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .btn-clear-all:hover { border-color: var(--red); color: var(--red); }

    .labels-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 12px;
      color: var(--border);
    }

    .empty-state .big { font-size: 48px; }
    .empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── LABEL CARD ── */
    .label-card {
      background: var(--white);
      border: 1.5px solid var(--black);
      border-radius: 3px;
      width: 164px;
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      box-shadow: 2px 2px 0 var(--black);
      page-break-inside: avoid;
    }

    .label-card .lc-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gray);
      width: 100%;
      text-align: center;
      border-bottom: 1px solid var(--cream);
      padding-bottom: 5px;
    }

    .label-card .lc-brand span { color: var(--gold); }

    .label-card .lc-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
      color: var(--black);
      max-width: 144px;
    }

    .label-card .lc-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      color: var(--black);
      border-top: 1px solid var(--cream);
      padding-top: 5px;
      width: 100%;
      text-align: center;
    }

    .label-card .lc-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      color: var(--gray);
      letter-spacing: 0.5px;
    }

    .btn-remove {
      position: absolute;
      top: 4px;
      right: 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--border);
      line-height: 1;
      transition: color 0.15s;
    }

    .btn-remove:hover { color: var(--red); }

    /* ── PRINT STYLES ── */
    @media print {
      @page {
        size: 1.125in 3.5in;
        margin: 0;
      }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; box-sizing: border-box; }
      .header, .left-panel, .right-header, .btn-remove, .toast, .empty-state { display: none !important; }
      body { background: white; margin: 0; padding: 0; overflow: hidden; }
      .layout { display: block; }
      .right-panel { padding: 0; margin: 0; }
      .labels-grid { gap: 0; display: block; margin: 0; padding: 0; }
      .label-card {
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
        width: 1.125in !important;
        height: 3.5in !important;
        min-height: 0 !important;
        max-height: 3.5in !important;
        padding: 4pt 3pt !important;
        margin: 0 !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 4pt !important;
        overflow: hidden !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        page-break-after: always !important;
        break-after: page !important;
      }
      .label-card:last-of-type {
        page-break-after: avoid !important;
        break-after: avoid !important;
      }
      .label-card .lc-brand { display: none !important; }
      .label-card .lc-date { display: none !important; }
      .label-card .lc-price { display: none !important; }
      .label-card .lc-name {
        font-size: 7pt !important;
        font-weight: 700 !important;
        text-align: center !important;
        word-break: break-word !important;
        width: 100% !important;
        line-height: 1.2 !important;
        overflow: hidden !important;
        font-family: 'IBM Plex Sans', sans-serif !important;
      }
      #qr-container { flex-shrink: 0 !important; width: 1in !important; height: 1in !important; display: flex !important; align-items: center !important; justify-content: center !important; overflow: hidden !important; }
      [id^="qr-"] { width: 1in !important; height: 1in !important; overflow: hidden !important; }
      [id^="qr-"] img, [id^="qr-"] canvas { width: 1in !important; height: 1in !important; display: block !important; }
    }
  </style>
</head>
<body>

<!-- PIN OVERLAY -->
<div id="pin-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f0f0f;z-index:9999;display:flex;align-items:center;justify-content:center;padding:6vw;box-sizing:border-box;">
  <div style="width:100%;max-width:340px;text-align:center;">
    <div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(16px,4vw,22px);letter-spacing:4px;color:#444;text-transform:uppercase;margin-bottom:8vw;">PRICE<span style="color:#cc0000;">TRAX</span> &mdash; BADGER BREAKS</div>
    <div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(12px,3.5vw,16px);letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:5vw;">Enter Staff PIN</div>
    <div style="display:flex;justify-content:center;gap:16px;margin-bottom:8vw;">
      <div id="pd0" style="width:18px;height:18px;border-radius:50%;background:#222;border:2px solid #444;"></div>
      <div id="pd1" style="width:18px;height:18px;border-radius:50%;background:#222;border:2px solid #444;"></div>
      <div id="pd2" style="width:18px;height:18px;border-radius:50%;background:#222;border:2px solid #444;"></div>
      <div id="pd3" style="width:18px;height:18px;border-radius:50%;background:#222;border:2px solid #444;"></div>
    </div>
    <div id="pin-overlay-error" style="font-family:Impact,'Arial Narrow',sans-serif;font-size:14px;color:#cc0000;letter-spacing:2px;text-transform:uppercase;min-height:20px;margin-bottom:16px;"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:260px;margin:0 auto;">
      <button id="pb1" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">1</button>
      <button id="pb2" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">2</button>
      <button id="pb3" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">3</button>
      <button id="pb4" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">4</button>
      <button id="pb5" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">5</button>
      <button id="pb6" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">6</button>
      <button id="pb7" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">7</button>
      <button id="pb8" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">8</button>
      <button id="pb9" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">9</button>
      <button id="pbdel" style="background:#1a1a1a;border:1px solid #333;color:#cc0000;font-size:24px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;grid-column:2;">&#9003;</button>
      <button id="pb0" style="background:#1a1a1a;border:1px solid #333;color:#fff;font-size:32px;font-family:Impact,'Arial Narrow',sans-serif;padding:16px;border-radius:8px;cursor:pointer;touch-action:manipulation;">0</button>
    </div>
  </div>
</div>

<script>
(function() {
  var PIN = "2323";
  var entered = "";
  var dotEls = [
    document.getElementById("pd0"),
    document.getElementById("pd1"),
    document.getElementById("pd2"),
    document.getElementById("pd3")
  ];

  function enterDigit(digit) {
    if (entered.length >= 4) return;
    entered += digit;
    dotEls[entered.length - 1].style.background = "#cc0000";
    dotEls[entered.length - 1].style.borderColor = "#cc0000";
    if (entered.length === 4) {
      if (entered === PIN) {
        document.getElementById("pin-overlay").style.display = "none";
        sessionStorage.setItem("pt_auth", "1");
      } else {
        document.getElementById("pin-overlay-error").textContent = "Incorrect PIN";
        setTimeout(function() {
          entered = "";
          dotEls.forEach(function(d) { d.style.background = "#222"; d.style.borderColor = "#444"; });
          document.getElementById("pin-overlay-error").textContent = "";
        }, 600);
      }
    }
  }

  function deleteDigit() {
    if (entered.length === 0) return;
    entered = entered.slice(0, -1);
    dotEls[entered.length].style.background = "#222";
    dotEls[entered.length].style.borderColor = "#444";
    document.getElementById("pin-overlay-error").textContent = "";
  }

  // Check if already authenticated this session
  if (sessionStorage.getItem("pt_auth") === "1") {
    document.getElementById("pin-overlay").style.display = "none";
  }

  function attachBtn(id, fn) {
    var el = document.getElementById(id);
    el.addEventListener('touchend', function(e) { e.preventDefault(); fn(); }, { passive: false });
    el.addEventListener('click', fn);
  }

  attachBtn('pb1', function(){ enterDigit('1'); });
  attachBtn('pb2', function(){ enterDigit('2'); });
  attachBtn('pb3', function(){ enterDigit('3'); });
  attachBtn('pb4', function(){ enterDigit('4'); });
  attachBtn('pb5', function(){ enterDigit('5'); });
  attachBtn('pb6', function(){ enterDigit('6'); });
  attachBtn('pb7', function(){ enterDigit('7'); });
  attachBtn('pb8', function(){ enterDigit('8'); });
  attachBtn('pb9', function(){ enterDigit('9'); });
  attachBtn('pb0', function(){ enterDigit('0'); });
  attachBtn('pbdel', deleteDigit);
})();
</script>

<header class="header no-print">
  <div class="header-logo">
    <span style="display:inline-block;width:18px;height:18px;background:var(--gold);border-radius:2px;transform:rotate(45deg);flex-shrink:0;margin-right:4px;"></span><span class="wordmark">PRICE<span>TRAX</span></span>
  </div>
  <div class="header-sub">PriceTrax</div>
  <div class="header-actions">
    <button class="btn-print" onclick="printLabels()">⎙ Print Labels</button>
    <a href="https://docs.google.com/spreadsheets/d/1FZsoPeXGp1eXJw1S2X6UoxRypSLm3_tj7RpXWL0yWJo/edit" target="_blank" style="text-decoration:none;">
      <button class="btn-print">📊 View Sheet</button>
    </a>
  </div>
</header>

<div class="layout">

  <!-- LEFT: INPUT -->
  <aside class="left-panel no-print">

    <div>
      <div class="section-label">New Card Entry</div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="input-group">
          <label>Card Name</label>
          <input type="text" id="cardName" placeholder="e.g. 2021 Topps Chrome Trout" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('cardPrice').focus()">
        </div>
        <div class="price-row">
          <div class="input-group">
            <label>Purchase Price ($)</label>
            <input type="number" id="cardPrice" placeholder="0.00" min="0" step="0.01" onkeydown="if(event.key==='Enter')addLabel()">
          </div>
          <div class="input-group">
            <label>Qty</label>
            <input type="number" id="cardQty" placeholder="1" min="1" step="1" value="1" onkeydown="if(event.key==='Enter')addLabel()">
          </div>

        <button class="btn-add" onclick="addLabel()">+ Add Label</button>

  <!-- RIGHT: LABELS -->

      <p>Enter a card on the left to get started</p>
    </div>

    <div class="labels-grid" id="labels-grid"></div>
  </main>

</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxFwky0fg4MaekMMi53meyFNgQNQuEdAnFP-Na3diwWchir1OYF0CJkm0xMfzueogmNQw/exec";

let labels = [];
let totalSpent = 0;

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = "toast"; }, 3000);
}

function logToSheet(name, price, date) {
  const callbackName = "cb_" + Date.now();
  const url = `${SHEET_URL}?action=log&n=${encodeURIComponent(name)}&p=${encodeURIComponent(price)}&t=${date}&callback=${callbackName}`;
  window[callbackName] = function() {
    delete window[callbackName];
    document.getElementById(callbackName) && document.getElementById(callbackName).remove();
  };
  const script = document.createElement("script");
  script.id = callbackName;
  script.src = url;
  document.body.appendChild(script);
  setTimeout(() => {
    delete window[callbackName];
    script.remove();
  }, 10000);
}

function addLabel() {
  const nameEl = document.getElementById("cardName");
  const priceEl = document.getElementById("cardPrice");
  const qtyEl = document.getElementById("cardQty");

  const name = nameEl.value.trim();
  const price = parseFloat(priceEl.value);
  const qty = parseInt(qtyEl.value) || 1;

  if (!name) { showToast("Please enter a card name.", "err"); nameEl.focus(); return; }
  if (isNaN(price) || price < 0) { showToast("Please enter a valid price.", "err"); priceEl.focus(); return; }

  const date = new Date().toISOString().split("T")[0];

  for (let i = 0; i < qty; i++) {
    const id = Date.now() + i;
    labels.push({ id, name, price: price.toFixed(2), date });
    renderLabel({ id, name, price: price.toFixed(2), date });
    logToSheet(name, price.toFixed(2), date);
    totalSpent += price;
  }

  updateStats();
  nameEl.value = "";
  priceEl.value = "";
  qtyEl.value = "1";
  nameEl.focus();

  saveLabels();
  const msg = qty > 1 ? `✓ ${qty}× ${name} logged` : `✓ ${name} logged`;
  showToast(msg, "ok");
}

function renderLabel({ id, name, price, date }) {
  document.getElementById("empty-state").style.display = "none";

  const t = new Date().toISOString().split("T")[0];
  // Simple encode — XOR each char with PIN key so price isn't visible in URL
  function encodePrice(price) {
    var key = "2323";
    var result = "";
    for (var i = 0; i < price.length; i++) {
      result += String.fromCharCode(price.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return btoa(result);
  }
  const url = `https://pricetrax.badgerbreaks.com/scan.html?n=${encodeURIComponent(name)}&p=${encodePrice(price)}&t=${t}`;

  const card = document.createElement("div");
  card.className = "label-card";
  card.id = "label-" + id;
  card.innerHTML = `
    <button class="btn-remove no-print" onclick="removeLabel(${id})" title="Remove">✕</button>
    <div class="lc-brand">PRICE<span>TRAX</span></div>
    <div id="qr-container"><div id="qr-${id}"></div></div>
    <div class="lc-name">${escHtml(name)}</div>
    <div class="lc-price">$${price}</div>
    <div class="lc-date">${date}</div>
  `;
  document.getElementById("labels-grid").appendChild(card);

  setTimeout(() => {
    new QRCode(document.getElementById("qr-" + id), {
      text: url,
      width: 120,
      height: 120,
      colorDark: "#0f0f0f",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M,
    });
  }, 50);
}

function removeLabel(id) {
  const idx = labels.findIndex(l => l.id === id);
  if (idx !== -1) {
    totalSpent -= parseFloat(labels[idx].price);
    labels.splice(idx, 1);
  }
  const el = document.getElementById("label-" + id);
  if (el) el.remove();
  updateStats();
  saveLabels();
  if (labels.length === 0) {
    document.getElementById("empty-state").style.display = "flex";
  }
}

function clearAll() {
  if (labels.length === 0) return;
  if (!confirm("Clear all labels?")) return;
  labels = [];
  totalSpent = 0;
  document.getElementById("labels-grid").innerHTML = "";
  document.getElementById("empty-state").style.display = "flex";
  updateStats();
  saveLabels();
}

function updateStats() {
  const n = labels.length;
  document.getElementById("stat-count").textContent = n;
  document.getElementById("stat-total").textContent = "$" + totalSpent.toFixed(2);
  document.getElementById("label-count").textContent =
    n === 0 ? "No labels yet" : `${n} label${n !== 1 ? "s" : ""} — hit Print Labels to print`;
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Load saved labels from localStorage
function loadSaved() {
  try {
    const saved = localStorage.getItem("pricetrax_labels");
    if (saved) {
      const parsed = JSON.parse(saved);
      parsed.forEach(l => {
        labels.push(l);
        totalSpent += parseFloat(l.price);
        renderLabel(l);
      });
      updateStats();
    }
  } catch(e) { console.warn("Could not load saved labels", e); }
}

function saveLabels() {
  try {
    localStorage.setItem("pricetrax_labels", JSON.stringify(labels));
  } catch(e) { console.warn("Could not save labels", e); }
}

loadSaved();
function printLabels() {
  if (labels.length === 0) {
    showToast("No labels to print.", "err");
    return;
  }

  // Build label HTML — pair 2 per sheet stacked vertically
  let labelHTML = "";
  for (let i = 0; i < labels.length; i += 2) {
    const a = labels[i];
    const b = labels[i + 1];
    const qrA = getQRDataUrl(a.id);
    const qrB = b ? getQRDataUrl(b.id) : null;
    labelHTML += `<div class="sheet">`;
    labelHTML += `<div class="label"><img src="${qrA}"/><div class="name">${a.name}</div></div>`;
    if (qrB) {
      labelHTML += `<div class="divider"></div>`;
      labelHTML += `<div class="label"><img src="${qrB}"/><div class="name">${b.name}</div></div>`;
    }
    labelHTML += `</div>`;
  }

  const win = window.open("", "_blank", "width=600,height=400");
  win.document.write(`<!DOCTYPE html>
<html><head>
<style>
  @page { size: 1.125in 3.5in portrait; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; width: 1.125in; background: white; font-family: 'IBM Plex Sans', Arial, sans-serif; }
  .sheet {
    width: 1.125in;
    height: 3.5in;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-around;
    page-break-after: always;
    break-after: page;
    overflow: hidden;
  }
  .sheet:last-child { page-break-after: avoid !important; break-after: avoid !important; }
  .label {
    width: 1.125in;
    height: 1.6in;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3pt 2pt;
    gap: 2pt;
    overflow: hidden;
  }
  .divider { width: 90%; height: 0.5pt; background: #ccc; flex-shrink: 0; }
  .label img { width: 0.9in; height: 0.9in; flex-shrink: 0; display: block; }
  .name { font-size: 6pt; font-weight: 700; line-height: 1.2; word-break: break-word; text-align: center; width: 100%; overflow: hidden; }
</style>
</head><body>
${labelHTML}
<script>window.onload = function(){ window.print(); window.onafterprint = function(){ window.close(); }; }<\/script>
</body></html>`);
  win.document.close();
}

function getQRDataUrl(id) {
  const el = document.getElementById("qr-" + id);
  if (!el) return "";
  const canvas = el.querySelector("canvas");
  if (canvas) return canvas.toDataURL("image/png");
  const img = el.querySelector("img");
  if (img) return img.src;
  return "";
}

document.getElementById("cardName").focus();
</script>
</body>
